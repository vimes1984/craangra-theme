<!-- 🌿 Top Announcement Bar -->
<div class="announcement-bar">
	<div class="announcement-container">
		<span><i class="fa-solid fa-seedling"></i> 100% Peat-Free &amp; Pesticide-Free Nursery</span>
		<span class="announcement-divider">|</span>
		<span><i class="fa-solid fa-truck-fast"></i> Free Local Delivery in Leitrim on orders over €50</span>
		<span class="announcement-divider">|</span>
		<span><i class="fa-solid fa-cloud-sun-rain"></i> Hardened to the West of Ireland Climate</span>
	</div>
</div>

<!-- Header / Navigation -->
<header class="main-header">
	<div class="header-container">
		<a href="/" class="logo">
			<img src="/wp-content/themes/crann-gra-theme/images/logo.jpg" alt="Crann Grá Logo" class="logo-image">
			<div class="logo-text-group">
				<span class="logo-text">Crann Grá</span>
				<span class="sub-logo">at Bumble Cottage</span>
			</div>
		</a>
		
		<nav class="nav-menu" id="navMenu">
			<a href="/" class="nav-link">Home</a>
			<a href="/shop/" class="nav-link">Shop Plants</a>
			<a href="/our-story/" class="nav-link">Our Story</a>
			<a href="/blog/" class="nav-link">Potting Shed Diary</a>
			<a href="/contact/" class="nav-link">Contact Us</a>
		</nav>

		<div class="header-actions">
			<button class="theme-toggle-btn" id="themeToggleBtn" title="Toggle Theme" style="background:none; border:none; color:inherit; cursor:pointer; font-size:18px; margin-right:20px; display:inline-flex; align-items:center; transition: transform 0.2s ease;">
				<i class="fa-solid fa-moon"></i>
			</button>
			<a href="/cart/" class="cart-btn" title="Open Shopping Basket" style="text-decoration:none; color:inherit;">
				<i class="fa-solid fa-basket-shopping"></i>
				<span class="cart-count" id="cartCount">0</span>
			</a>
			<button class="mobile-nav-toggle" id="mobileNavToggle" title="Toggle Mobile Navigation">
				<i class="fa-solid fa-bars"></i>
			</button>
		</div>
	</div>
</header>

<script>
document.addEventListener('DOMContentLoaded', function() {
	var toggleBtn = document.getElementById('mobileNavToggle');
	var navMenu = document.getElementById('navMenu');
	if (toggleBtn && navMenu) {
		toggleBtn.addEventListener('click', function() {
			navMenu.classList.toggle('active');
		});
	}
	
	// Dark Mode Theme Toggle
	var themeToggleBtn = document.getElementById('themeToggleBtn');
	if (themeToggleBtn) {
		var currentTheme = localStorage.getItem('theme');
		if (currentTheme === 'dark') {
			document.body.classList.add('dark-mode');
			themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
		}
		
		themeToggleBtn.addEventListener('click', function() {
			document.body.classList.toggle('dark-mode');
			var theme = 'light';
			if (document.body.classList.contains('dark-mode')) {
				theme = 'dark';
				themeToggleBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
			} else {
				themeToggleBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
			}
			localStorage.setItem('theme', theme);
		});
		
		themeToggleBtn.addEventListener('mouseenter', function() {
			this.style.transform = 'scale(1.15)';
		});
		themeToggleBtn.addEventListener('mouseleave', function() {
			this.style.transform = 'scale(1)';
		});
	}
	
	// Update WooCommerce Cart Count dynamically if WC is active
	var cartCountEl = document.getElementById('cartCount');
	if (cartCountEl && typeof jQuery !== 'undefined') {
		jQuery(document.body).on('added_to_cart removed_from_cart updated_cart_totals', function() {
			jQuery.ajax({
				url: '/?wc-ajax=get_refreshed_fragments',
				type: 'POST',
				success: function(data) {
					if (data && data.fragments) {
						fetch('/wp-json/wc/store/v1/cart')
							.then(res => res.json())
							.then(cart => {
								if (cart && typeof cart.items_count !== 'undefined') {
									cartCountEl.textContent = cart.items_count;
								}
							});
					}
				}
			});
		});
		
		// Initial fetch on page load
		fetch('/wp-json/wc/store/v1/cart')
			.then(res => res.json())
			.then(cart => {
				if (cart && typeof cart.items_count !== 'undefined') {
					cartCountEl.textContent = cart.items_count;
				}
			}).catch(() => {});
	}
});
</script>
